<div
  class="whiteboard-toolbar d-flex flex-wrap gap-2 p-2 border-bottom bg-white"
>
  <!-- Drawing Tools -->
  <div class="btn-group" role="group" aria-label="Drawing Tools">
    <button class="btn btn-outline-dark" id="tool-pen" title="Pen">✏️</button>
    <button class="btn btn-outline-dark" id="tool-eraser" title="Eraser">
      🧽
    </button>
  </div>

  <!-- Shapes -->
  <div class="btn-group" role="group" aria-label="Shapes">
    <button class="btn btn-outline-secondary" id="tool-rect" title="Rectangle">
      ▭
    </button>
    <button class="btn btn-outline-secondary" id="tool-circle" title="Circle">
      ◯
    </button>
    <button class="btn btn-outline-secondary" id="tool-line" title="Line">
      ／
    </button>
  </div>

  <!-- Color Picker -->
  <div class="d-flex align-items-center gap-1">
    <label for="color-picker" class="small">🎨</label>
    <input type="color" id="color-picker" value="#000000" title="Pick Color" />
  </div>

  <!-- Brush Size -->
  <div class="d-flex align-items-center gap-1">
    <label for="brush-size" class="small">📏</label>
    <input
      type="range"
      id="brush-size"
      min="1"
      max="20"
      value="3"
      title="Brush Size"
    />
  </div>

  <!-- Actions -->
  <div class="btn-group ms-auto" role="group" aria-label="Actions">
    <button class="btn btn-outline-warning" id="undo" title="Undo">↩️</button>
    <button class="btn btn-outline-warning" id="redo" title="Redo">↪️</button>
    <button class="btn btn-outline-danger" id="clear" title="Clear Canvas">
      🗑️
    </button>
  </div>
</div>
